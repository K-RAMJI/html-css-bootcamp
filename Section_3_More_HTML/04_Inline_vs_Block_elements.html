<!--In HTML, elements are categorized into two main types based on their default behavior in terms of layout and flow within a document: inline elements and block-level elements.

1. **Inline Elements:**
   - **Default Behavior:** Inline elements do not start on a new line. They only take up as much width as necessary and do not force a line break after them.
   - **Examples:** `<span>`, `<a>`, `<strong>`, `<em>`, `<img>`, `<br>`, `<i>`, `<code>`.
   - **Usage:** Typically used for elements that are part of the flow of text, such as emphasizing text, creating links, or adding inline styles.

   ```html
   <p>This is <strong>strong</strong> and <em>emphasized</em> text.</p>
   <a href="#">This is a link</a>.
   ```

2. **Block-Level Elements:**
   - **Default Behavior:** Block-level elements start on a new line and stretch the full width of their container, creating a "block" of content. They often create a visual separation from the elements before and after them.
   - **Examples:** `<div>`, `<p>`, `<h1>` to `<h6>`, `<ul>`, `<li>`, `<table>`, `<form>`.
   - **Usage:** Used for larger structures in the document, like paragraphs, headings, lists, and other structural components.

   ```html
   <div>
     <h2>This is a heading</h2>
     <p>This is a paragraph of text.</p>
   </div>

   <ul>
     <li>Item 1</li>
     <li>Item 2</li>
     <li>Item 3</li>
   </ul>
   ```

It's important to note that the distinction between inline and block-level elements is a generalization, and the display behavior can be modified using CSS. For example, you can use the CSS `display` property to change an element's display type. Some elements, like `<span>` or `<a>`, can be styled to behave as block-level elements or vice versa.

```css
span {
  display: block; /* Make the span behave as a block-level element */
}

a {
  display: inline-block; /* Make the anchor behave as an inline-block element */
}
```

Understanding the difference between block-level and inline elements is crucial for creating well-structured and visually appealing web pages.-->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <em>Lorem !!!</em
    ><!--Inline element-->
    <p>
      <!--Block element-->
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Earum saepe amet
      officia quod accusantium quibusdam, beatae optio culpa blanditiis quos
